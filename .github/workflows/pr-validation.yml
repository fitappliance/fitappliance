name: PR Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Regenerate generated assets
        run: npm run generate-all

      - name: Verify sitemap coverage
        run: node scripts/verify-sitemap.js

      - name: Audit review content gate
        run: npm run audit-review-content

      - name: Ensure generated outputs are committed
        run: |
          echo "Note: public/og-images is maintained by the Linux OG sync workflow because Sharp output bytes are platform-dependent across platforms."
          git diff --exit-code -- . ':(exclude)public/og-images/**'
