name: PR Validation

on:
  pull_request:

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Regenerate generated assets
        run: |
          npm run generate-pages
          npm run generate-cavity
          npm run generate-doorway
          npm run generate-guides
          npm run generate-location
          npm run generate-sitemap
          npm run generate-rss
          npm run build-link-graph
          npm run validate-schema

      - name: Ensure generated outputs are committed
        run: git diff --exit-code
