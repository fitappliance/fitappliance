name: Copy Lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copy-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Audit generated copy
        run: npm run audit-copy
