name: Documentation Audit

on:
  pull_request:
  workflow_dispatch:

jobs:
  doc-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Audit markdown documentation drift
        run: npm run audit-docs
