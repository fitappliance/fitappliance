name: Auto Content Pipeline

on:
  schedule:
    - cron: '0 4 * * 3'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build auto-content candidate report
        run: npm run auto-content

      - name: Open content PRs (max 10)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run open-content-pr
