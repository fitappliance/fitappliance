name: Ping IndexNow on Deploy

on:
  push:
    branches: [main]
    paths:
      - 'public/sitemap.xml'
      - 'pages/**'
      - 'index.html'
      - 'public/*.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Wait for Vercel deploy
        run: sleep 60
      - name: Ping IndexNow
        run: node scripts/ping-indexnow.js
