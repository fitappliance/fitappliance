name: Temporary OG diag for PR 15

on:
  workflow_dispatch:
  push:
    branches: [phase-43a-fix-queue]

permissions:
  contents: write

jobs:
  og-diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: phase-43a-fix-queue
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - name: Hash OG before
        run: find public/og-images -type f \( -name "*.png" -o -name "*.webp" \) | sort | xargs sha256sum > /tmp/og-before.txt
      - name: Run npm test
        run: npm test
      - name: Hash OG after npm test
        run: find public/og-images -type f \( -name "*.png" -o -name "*.webp" \) | sort | xargs sha256sum > /tmp/og-after-test.txt
      - name: Diff post-test
        run: diff /tmp/og-before.txt /tmp/og-after-test.txt | head -40 || true
      - name: Run generate-all
        run: npm run generate-all
      - name: Hash OG after generate-all
        run: find public/og-images -type f \( -name "*.png" -o -name "*.webp" \) | sort | xargs sha256sum > /tmp/og-after-genall.txt
      - name: Diff post-genall (vs original)
        run: diff /tmp/og-before.txt /tmp/og-after-genall.txt | head -40 || true
      - name: Diff post-genall (vs post-test)
        run: diff /tmp/og-after-test.txt /tmp/og-after-genall.txt | head -40 || true
      - name: Count drifted files
        run: |
          echo "=== Files changed after test ==="
          diff /tmp/og-before.txt /tmp/og-after-test.txt | grep -c "^>" || echo 0
          echo "=== Files changed after generate-all (cumulative) ==="
          diff /tmp/og-before.txt /tmp/og-after-genall.txt | grep -c "^>" || echo 0
