name: Temporary OG sync for PR 15

on:
  workflow_dispatch:
  push:
    branches:
      - phase-43a-fix-queue

permissions:
  contents: write

jobs:
  og-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: phase-43a-fix-queue
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run generate-all

      - name: Commit OG assets if drifted
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/og-images public/og 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore(og): linux-regen og assets for ci parity"
          git push origin phase-43a-fix-queue
