name: Sync Appliance Data

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run sync script
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: npm run sync

      - name: Regenerate compare pages
        run: npm run generate-comparisons

      - name: Verify compare quality gate
        run: npm run verify-compare-quality

      - name: Commit updated data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/appliances.json public/data/*.json pages/compare/*.html pages/compare/index.json
          git diff --cached --quiet || git commit -m "chore: auto-sync appliance data $(date +%Y-%m-%d)"

      - name: Push changes
        run: git push origin main
